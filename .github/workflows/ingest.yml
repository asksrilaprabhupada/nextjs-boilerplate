name: Ingest

on:
  workflow_dispatch:
  push:
    paths:
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ingest.yml"

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional overrides:
          EMBEDDING_MODEL: ${{ vars.EMBEDDING_MODEL }}
          INGEST_FILE: ${{ vars.INGEST_FILE }}
